- name: Setup Gym Target Server
  hosts: gym
  become: yes


  tasks:

    - name: Update apt cache
      apt:
        update_cache: yes

    - name: install required packages
      apt:
        name:
          - docker.io
          - git 
          - curl
        state : present

    - name: start and enable Docker
      systemd:
        name: docker
        enabled: yes
        state:  started
   
    - name: add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes
